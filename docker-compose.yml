version: "3.9"

services:
  app:
    image: ${DOCKER_IMAGE:-mini-redis:local}
    build: .
    container_name: mini_redis_app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mini_redis_store
    ports:
      - "6379:6379"
    restart: unless-stopped
