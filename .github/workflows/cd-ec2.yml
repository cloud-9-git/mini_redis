name: CD-EC2

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mini-redis:latest

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            if ! command -v docker >/dev/null 2>&1 || ! docker compose version >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              sudo install -m 0755 -d /etc/apt/keyrings
              sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
              sudo chmod a+r /etc/apt/keyrings/docker.asc
              if [ ! -f /etc/apt/sources.list.d/docker.list ]; then
                echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              fi
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            fi

            mkdir -p ${{ secrets.EC2_APP_DIR }}
            cd ${{ secrets.EC2_APP_DIR }}
            if [ ! -f docker-compose.yml ]; then
              cat > docker-compose.yml <<'EOF'
            version: "3.9"
            
            services:
              app:
                image: ${DOCKER_IMAGE}
                container_name: mini_redis_app
                ports:
                  - "8000:8000"
                depends_on:
                  - redis
                environment:
                  - REDIS_HOST=redis
                  - REDIS_PORT=6379
                restart: unless-stopped
            
              redis:
                image: redis:7-alpine
                container_name: mini_redis_store
                ports:
                  - "6379:6379"
                restart: unless-stopped
            EOF
            fi

            cat > .env <<EOF
            DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/mini-redis:latest
            EOF
            docker compose pull
            docker compose up -d
            sleep 3
            curl -f http://localhost:8000/v1/health
